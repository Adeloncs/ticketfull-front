server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão de assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml font/woff2 image/svg+xml;

    # Proxy reverso para a API (backend Spring Boot na rede docker-compose).
    # Ajuste o host "backend" / porta conforme o nome do serviço no compose.
    location /api/ {
        proxy_pass http://backend:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Repassa cookies (ex.: refreshToken HttpOnly) sem reescrita
        proxy_pass_request_headers on;
    }

    # Cache agressivo para assets com hash no nome
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de rotas do SPA Angular
    location / {
        try_files $uri $uri/ /index.html;
    }
}
